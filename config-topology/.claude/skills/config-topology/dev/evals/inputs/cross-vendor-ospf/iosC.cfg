!
hostname CORE-IOS
!
interface Loopback0
 ip address 10.250.0.1 255.255.255.255
!
interface GigabitEthernet0/0
 description OSPF-LINK-to-JUNOS
 ip address 10.2.0.1 255.255.255.252
!
interface GigabitEthernet0/1
 description CAMPUS-LAN
 ip address 10.20.0.1 255.255.255.0
!
router ospf 1
 router-id 10.250.0.1
 network 10.2.0.0 0.0.0.3 area 0
 network 10.20.0.0 0.0.0.255 area 0
!
end
