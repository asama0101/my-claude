!
! Phase 3G: IPv6 routing fixture — Cisco IOS
! OSPFv3 area 0 (Gi0/0) + area 1 (Gi0/1)
! BGP IPv6 AF: iBGP to iosR2 (same AS 65100), eBGP to junosR (AS 65200)
! IPv6 static default route
! Dual-stack throughout
!
hostname IOS-R1
!
interface Loopback0
 ip address 10.255.1.1 255.255.255.255
 ipv6 address 2001:db8:ff::1/128
!
interface GigabitEthernet0/0
 description to-JUNOS-R1
 ip address 10.1.0.1 255.255.255.252
 ipv6 address 2001:db8:1::1/127
 ipv6 address fe80::1:1 link-local
 ipv6 ospf 10 area 0
 no shutdown
!
interface GigabitEthernet0/1
 description to-IOS-R2-iBGP
 ip address 10.2.0.1 255.255.255.252
 ipv6 address 2001:db8:2::1/127
 ipv6 address fe80::1:2 link-local
 ipv6 ospf 10 area 1
 no shutdown
!
ipv6 router ospf 10
 router-id 10.255.1.1
!
router bgp 65100
 neighbor 10.1.0.2 remote-as 65200
 neighbor 2001:db8:1::0 remote-as 65200
 neighbor 2001:db8:2::0 remote-as 65100
 address-family ipv6
  neighbor 2001:db8:1::0 activate
  neighbor 2001:db8:2::0 activate
 exit-address-family
!
ipv6 route ::/0 2001:db8:1::0
!
end
