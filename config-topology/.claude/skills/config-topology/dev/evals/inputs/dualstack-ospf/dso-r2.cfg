!
! dualstack-ospf fixture: DSO-R2
! v4 OSPFv2 (router ospf + network) + v6 OSPFv3 (ipv6 ospf area) 両方有効
! Cisco IOS
!
hostname DSO-R2
!
interface Loopback0
 ip address 10.255.2.1 255.255.255.255
 ipv6 address 2001:db8:ff::2/128
!
interface GigabitEthernet0/0
 description to-DSO-R1
 ip address 10.0.0.2 255.255.255.252
 ipv6 address 2001:db8:1::0/127
 ipv6 ospf 1 area 0
 no shutdown
!
router ospf 1
 network 10.0.0.0 0.0.0.3 area 0
!
ipv6 router ospf 1
 router-id 10.255.2.1
!
end
