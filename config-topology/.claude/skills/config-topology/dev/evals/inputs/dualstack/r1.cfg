!
! Dual-stack Cisco IOS config for Phase 3F testing
! Includes: IPv4 primary, IPv4 secondary, IPv6 global, IPv6 link-local
!
hostname DS-R1
!
interface GigabitEthernet0/0
 description to-DS-R2
 ip address 10.0.0.1 255.255.255.252
 ip address 10.0.0.5 255.255.255.252 secondary
 ipv6 address 2001:db8:1::1/127
 ipv6 address fe80::1 link-local
 no shutdown
!
interface GigabitEthernet0/1
 description LAN
 ip address 192.168.1.1 255.255.255.0
 ipv6 address 2001:db8:2::1/64
 no shutdown
!
interface GigabitEthernet0/2
 description v6-only-link-to-R2
 ipv6 address 2001:db8:3::1/127
 ipv6 address fe80::11 link-local
 no shutdown
!
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
 ipv6 address 2001:db8:ff::1/128
!
router bgp 65001
 neighbor 10.0.0.2 remote-as 65002
!
end
