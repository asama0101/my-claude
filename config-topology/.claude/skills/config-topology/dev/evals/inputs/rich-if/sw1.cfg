!
! Cisco IOS rich-IF fixture
! Covers: mtu, speed, duplex, switchport access/trunk, encapsulation dot1q,
!         shutdown (admin_status=down), description, ip address, no ip (L2)
!
hostname SW1
!
interface GigabitEthernet0/0
 description uplink-to-core
 ip address 10.0.1.1 255.255.255.252
 no shutdown
 mtu 9000
 speed 1000
 duplex full
!
interface GigabitEthernet0/1
 description access-port-vlan10
 no ip address
 switchport mode access
 switchport access vlan 10
 mtu 1500
 speed 100
 duplex half
!
interface GigabitEthernet0/2
 description trunk-port-to-sw2
 no ip address
 switchport mode trunk
 switchport trunk allowed vlan 10,20,30
 mtu 1500
 speed 1000
 duplex full
!
interface GigabitEthernet0/3
 description routed-subif-parent
 no ip address
 shutdown
!
interface GigabitEthernet0/3.100
 description sub-interface-vlan100
 encapsulation dot1Q 100
 ip address 192.168.100.1 255.255.255.0
!
interface Loopback0
 description mgmt-loopback
 ip address 1.1.1.1 255.255.255.255
!
end
