<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>__TITLE__</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #ffffff;
    --fg: #1a1a1a;
    --muted: #6b6b6b;
    --border: #e0e0e0;
    --code-bg: #f5f5f5;
    --accent: #2563eb;
    --table-head: #f0f0f0;
    --checklist-bg: #fffbea;
    --warn-border: #e0b400;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16181d;
      --fg: #e6e6e6;
      --muted: #9a9a9a;
      --border: #30333a;
      --code-bg: #1f2228;
      --accent: #6ea8fe;
      --table-head: #22252b;
      --checklist-bg: #2a2510;
      --warn-border: #a88300;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.7;
  }
  .layout {
    max-width: min(1800px, 98vw);
    margin: 0 auto;
  }
  nav.toc {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 3px 20px;
    padding: 12px 8px;
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    max-height: 35vh;
    overflow-y: auto;
    font-size: 0.85rem;
  }
  nav.toc a {
    display: inline-block;
    color: var(--muted);
    text-decoration: none;
    white-space: nowrap;
  }
  nav.toc a:hover { color: var(--accent); }
  nav.toc a.toc-h2 {
    color: var(--fg);
    font-weight: 700;
    font-size: 0.95rem;
  }
  nav.toc a.toc-h3 {
    font-weight: 400;
    font-size: 0.8rem;
  }
  nav.toc a.toc-h3::before {
    content: "› ";
    color: var(--border);
  }
  main {
    padding: 28px 48px 80px;
  }
  header.report-header {
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  header.report-header .meta {
    color: var(--muted);
    font-size: 0.85rem;
  }
  h1, h2, h3, h4, h5 { scroll-margin-top: 16px; }
  h2 { border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-top: 48px; }
  h3 { margin-top: 40px; padding-top: 16px; border-top: 1px solid var(--border); }
  code, pre {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    background: var(--code-bg);
    border-radius: 4px;
  }
  code { padding: 0.1em 0.35em; font-size: 0.9em; }
  pre {
    padding: 12px 16px;
    overflow-x: auto;
    border: 1px solid var(--border);
  }
  pre code { background: none; padding: 0; }
  table {
    border-collapse: collapse;
    width: 100%;
    margin: 16px 0;
    font-size: 0.92rem;
    overflow-x: auto;
    display: block;
  }
  th, td {
    border: 1px solid var(--border);
    padding: 6px 10px;
    text-align: left;
    vertical-align: top;
  }
  th { background: var(--table-head); }
  details {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
    margin: 12px 0;
  }
  details summary {
    cursor: pointer;
    font-weight: 600;
  }
  ul.checklist { list-style: none; padding-left: 0; }
  ul.checklist li {
    background: var(--checklist-bg);
    border-left: 3px solid var(--warn-border);
    padding: 6px 10px;
    margin: 6px 0;
    border-radius: 4px;
  }
  blockquote {
    border-left: 3px solid var(--accent);
    margin: 12px 0;
    padding: 4px 14px;
    color: var(--muted);
  }
  @media (max-width: 900px) {
    nav.toc { gap: 3px 12px; padding: 10px 8px; }
    main { padding: 24px 20px 60px; }
  }
  /* callgraph: インタラクティブSVG呼び出し図(callgraph.js が描画対象)。 */
  .callgraph-wrap { margin: 16px 0; }
  .callgraph-toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin-bottom: 6px;
  }
  .callgraph-toolbar input[type="text"] {
    flex: 1 1 200px;
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--fg);
    font-size: 0.85rem;
  }
  .callgraph-toolbar button {
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--code-bg);
    color: var(--fg);
    cursor: pointer;
    font-size: 0.85rem;
  }
  .callgraph-toolbar button:hover { border-color: var(--accent); color: var(--accent); }
  .callgraph {
    position: relative;
    width: 100%;
    height: 480px;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    background: var(--bg);
    cursor: grab;
    touch-action: none;
  }
  .callgraph.callgraph-dragging { cursor: grabbing; }
  .callgraph svg { width: 100%; height: 100%; display: block; }
  .callgraph-node { cursor: pointer; }
  .callgraph-node rect { fill: var(--code-bg); stroke: var(--border); stroke-width: 1.2; }
  .callgraph-node.callgraph-terminal rect { stroke-dasharray: 4 3; }
  .callgraph-node text { fill: var(--fg); font-size: 12px; }
  .callgraph-node.callgraph-active rect,
  .callgraph-node.callgraph-match rect { stroke: var(--accent); stroke-width: 2; }
  .callgraph-node.callgraph-dim { opacity: 0.25; }
  .callgraph-edge path { fill: none; stroke: var(--muted); stroke-width: 1.4; }
  .callgraph-edge.callgraph-active path { stroke: var(--accent); stroke-width: 2; }
  .callgraph-edge.callgraph-dim { opacity: 0.2; }
  .callgraph-edge-label rect { fill: var(--bg); opacity: 0.85; }
  .callgraph-edge-label text { fill: var(--muted); font-size: 10px; }
  .callgraph-heading-flash { animation: callgraph-flash 1.5s ease-out; border-radius: 4px; }
  @keyframes callgraph-flash {
    0% { background: var(--checklist-bg); box-shadow: 0 0 0 3px var(--warn-border); }
    100% { background: transparent; box-shadow: 0 0 0 0 transparent; }
  }
</style>
</head>
<body>
<div class="layout">
  <nav class="toc">
    __TOC_HTML__
  </nav>
  <main>
    <header class="report-header">
      <h1>__TITLE__</h1>
      <div class="meta">生成日時: __GENERATED_AT__ / 対象: __TARGET__</div>
    </header>
    __BODY_HTML__
  </main>
</div>
__CALLGRAPH_ASSETS__
</body>
</html>
